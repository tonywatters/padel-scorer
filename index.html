<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e0e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Padel Scorer</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%;
      background: #0e0e0e;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      color: #fff;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ---- SCREENS ---- */
    .scr { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
    .scr.on { display: flex; }

    /* ---- SETUP ---- */
    #s-setup { gap: 3vh; padding: 4vh 8vw; }
    .s-title { font-size: 3.6vh; font-weight: 600; color: #666; letter-spacing: 0.12em; text-transform: uppercase; }
    .s-field { width: 100%; display: flex; flex-direction: column; gap: 0.6vh; }
    .s-lbl { font-size: 2.6vh; text-transform: uppercase; letter-spacing: 0.1em; padding-left: 2px; }
    .s-lbl.a { color: #4ade80; }
    .s-lbl.b { color: #fb923c; }
    .s-inp {
      width: 100%; padding: 1.6vh 2vw;
      background: #1c1c1c; border: 1px solid #2a2a2a;
      border-radius: 10px; color: #fff;
      font-size: 4.4vh; font-weight: 700; text-align: center; outline: none;
    }
    .s-inp::placeholder { color: #2e2e2e; font-weight: 400; }
    .s-inp.a:focus { border-color: #4ade80; }
    .s-inp.b:focus { border-color: #fb923c; }
    .s-vs { font-size: 2.6vh; color: #333; letter-spacing: 0.1em; }
    .s-go {
      width: 100%; padding: 1.8vh; margin-top: 0.5vh;
      background: #4ade80; border: none; border-radius: 40px;
      color: #000; font-size: 3.6vh; font-weight: 700; cursor: pointer;
    }
    .s-go:active { background: #3dbb6a; }

    /* ---- GAME ---- */
    #s-game { flex-direction: column; }

    .half {
      width: 100%; height: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; position: relative;
      transition: background 0.08s;
    }
    .half.t { padding-top: 3vh; }
    .half.b { padding-bottom: 3vh; }
    .half:active { background: rgba(255,255,255,0.05); }

    .g-col { display: flex; flex-direction: column; align-items: center; gap: 0.4vh; width: 14vw; }
    .g-num { font-size: 8vh; font-weight: 700; color: #777; line-height: 1; }
    .s-row { display: flex; gap: 1.4vw; }
    .s-pip { font-size: 3.2vh; font-weight: 600; color: #252525; min-width: 3vw; text-align: center; line-height: 1; }
    .s-pip.p { color: #555; }
    .s-pip.w { color: #999; }

    .div-v { width: 1px; height: 8vh; background: #222; margin: 0 3vw; }

    .p-col { display: flex; flex-direction: column; align-items: center; min-width: 26vw; }
    .pts { font-size: 19vh; font-weight: 700; line-height: 1; }
    .half.t .pts { color: #fff; }
    .half.b .pts { color: #4ade80; }
    .t-name { font-size: 2.6vh; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.4vh; }
    .half.t .t-name { color: #555; }
    .half.b .t-name { color: #2a6640; }

    .srv { width: 1.6vh; height: 1.6vh; border-radius: 50%; margin-left: 2vw; opacity: 0; }
    .srv.on { opacity: 1; }
    .half.t .srv { background: #fff; }
    .half.b .srv { background: #4ade80; }

    .net-line { position: absolute; left: 10%; right: 10%; top: 50%; height: 1px; background: #1e1e1e; transform: translateY(-50%); pointer-events: none; z-index: 5; }

    /* ---- CONTROLS ---- */
    .ctrl-row {
      position: absolute; bottom: 2vh; left: 50%; transform: translateX(-50%);
      display: flex; gap: 2vw; z-index: 15;
    }
    .ctrl-btn {
      padding: 1.2vh 4vw; border-radius: 30px;
      border: 1px solid #2a2a2a; background: rgba(20,20,20,0.85);
      color: #888; font-size: 2.6vh; font-weight: 500; cursor: pointer;
    }
    .ctrl-btn:active { background: #2a2a2a; }

    /* ---- OVERLAYS ---- */
    .ov { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.94); flex-direction: column; align-items: center; justify-content: center; gap: 2vh; z-index: 30; }
    .ov.on { display: flex; }
    .ov-title { font-size: 5vh; font-weight: 700; color: #4ade80; text-align: center; padding: 0 8vw; }
    .ov-title.warn { color: #fff; }
    .ov-sub { font-size: 2.6vh; color: #555; }
    .ov-btns { display: flex; gap: 3vw; margin-top: 1vh; }
    .ov-btn { padding: 1.6vh 6vw; border-radius: 40px; border: none; font-size: 3.2vh; font-weight: 700; cursor: pointer; }
    .ov-btn.y { background: #4ade80; color: #000; }
    .ov-btn.n { background: #1e1e1e; color: #888; }
  </style>
</head>
<body>

  <!-- SETUP SCREEN -->
  <div class="scr on" id="s-setup">
    <div class="s-title">New Match</div>
    <div class="s-field">
      <div class="s-lbl a">Your team</div>
      <input class="s-inp a" id="in-a" maxlength="8" placeholder="Us" autocomplete="off" />
    </div>
    <div class="s-vs">vs</div>
    <div class="s-field">
      <div class="s-lbl b">Opponents</div>
      <input class="s-inp b" id="in-b" maxlength="8" placeholder="Them" autocomplete="off" />
    </div>
    <button class="s-go" id="btn-start">Start Match</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="scr" id="s-game">
    <div class="half t" id="h-top">
      <div class="g-col">
        <div class="g-num" id="g-a">0</div>
        <div class="s-row">
          <span class="s-pip" id="sa0">-</span>
          <span class="s-pip" id="sa1">-</span>
          <span class="s-pip" id="sa2">-</span>
        </div>
      </div>
      <div class="div-v"></div>
      <div class="p-col">
        <div class="pts" id="pts-a">0</div>
        <div class="t-name" id="nm-a">Us</div>
      </div>
      <div class="srv" id="srv-a"></div>
    </div>

    <div class="net-line"></div>

    <div class="half b" id="h-bot">
      <div class="g-col">
        <div class="g-num" id="g-b">0</div>
        <div class="s-row">
          <span class="s-pip" id="sb0">-</span>
          <span class="s-pip" id="sb1">-</span>
          <span class="s-pip" id="sb2">-</span>
        </div>
      </div>
      <div class="div-v"></div>
      <div class="p-col">
        <div class="pts" id="pts-b">0</div>
        <div class="t-name" id="nm-b">Them</div>
      </div>
      <div class="srv" id="srv-b"></div>
    </div>

    <div class="ctrl-row">
      <button class="ctrl-btn" id="btn-undo">Undo</button>
      <button class="ctrl-btn" id="btn-new">New</button>
    </div>

    <!-- Winner overlay -->
    <div class="ov" id="ov-win">
      <div class="ov-title" id="win-txt">Us win!</div>
      <div class="ov-sub">Match complete</div>
      <div class="ov-btns"><button class="ov-btn y" id="btn-win-new">New Match</button></div>
    </div>

    <!-- Confirm overlay -->
    <div class="ov" id="ov-confirm">
      <div class="ov-title warn">End match?</div>
      <div class="ov-sub">Scores will be lost</div>
      <div class="ov-btns">
        <button class="ov-btn y" id="btn-yes">Yes</button>
        <button class="ov-btn n" id="btn-no">No</button>
      </div>
    </div>
  </div>

  <script>
    const PTS = ['0','15','30','40'];
    let nA = 'Us', nB = 'Them';
    const $ = id => document.getElementById(id);

    function fresh() {
      return { pA:0,pB:0,gA:0,gB:0,sA:0,sB:0,sets:[],srv:'a',deuce:false,advA:false,advB:false,tb:false,done:false };
    }
    let st = fresh();
    let hist = [];
    const clone = s => JSON.parse(JSON.stringify(s));

    function show(id) {
      document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
      $(id).classList.add('on');
    }

    function goSetup() {
      $('ov-win').classList.remove('on');
      $('ov-confirm').classList.remove('on');
      $('in-a').value = '';
      $('in-b').value = '';
      st = fresh();
      hist = [];
      show('s-setup');
    }

    function ptLabel(s, who) {
      if (s.tb) return who === 'a' ? s.pA : s.pB;
      if (s.deuce) {
        if (s.advA) return who === 'a' ? 'AD' : '';
        if (s.advB) return who === 'b' ? 'AD' : '';
        return 'DU';
      }
      return PTS[who === 'a' ? s.pA : s.pB];
    }

    function render() {
      $('pts-a').textContent = ptLabel(st, 'a');
      $('pts-b').textContent = ptLabel(st, 'b');
      $('g-a').textContent = st.gA;
      $('g-b').textContent = st.gB;
      $('nm-a').textContent = nA;
      $('nm-b').textContent = nB;

      for (let i = 0; i < 3; i++) {
        const sa = $('sa' + i), sb = $('sb' + i);
        if (st.sets[i]) {
          sa.textContent = st.sets[i][0];
          sb.textContent = st.sets[i][1];
          sa.className = 's-pip ' + (st.sets[i][0] > st.sets[i][1] ? 'w' : 'p');
          sb.className = 's-pip ' + (st.sets[i][1] > st.sets[i][0] ? 'w' : 'p');
        } else {
          sa.textContent = '-'; sb.textContent = '-';
          sa.className = 's-pip'; sb.className = 's-pip';
        }
      }

      $('srv-a').classList.toggle('on', st.srv === 'a');
      $('srv-b').classList.toggle('on', st.srv === 'b');

      if (st.done) {
        $('win-txt').textContent = (st.sA === 2 ? nA : nB) + ' win!';
        $('ov-win').classList.add('on');
      }
    }

    function winGame(who) {
      if (who === 'a') st.gA++; else st.gB++;
      st.pA = 0; st.pB = 0;
      st.deuce = false; st.advA = false; st.advB = false; st.tb = false;
      st.srv = st.srv === 'a' ? 'b' : 'a';

      if (st.gA === 6 && st.gB === 6) { st.tb = true; return; }

      const won = (st.gA >= 6 && st.gA - st.gB >= 2) ||
                  (st.gB >= 6 && st.gB - st.gA >= 2) ||
                  (st.gA === 7 || st.gB === 7);
      if (won) {
        st.sets.push([st.gA, st.gB]);
        if (who === 'a') st.sA++; else st.sB++;
        st.gA = 0; st.gB = 0;
        if (st.sA === 2 || st.sB === 2) st.done = true;
      }
    }

    function addPt(who) {
      if (st.done) return;
      hist.push(clone(st));

      if (st.tb) {
        if (who === 'a') st.pA++; else st.pB++;
        if (Math.max(st.pA, st.pB) >= 7 && Math.abs(st.pA - st.pB) >= 2) winGame(who);
      } else if (st.deuce) {
        if (st.advA || st.advB) {
          if ((st.advA && who === 'a') || (st.advB && who === 'b')) winGame(who);
          else { st.advA = false; st.advB = false; }
        } else {
          if (who === 'a') st.advA = true; else st.advB = true;
        }
      } else {
        if (who === 'a') st.pA++; else st.pB++;
        if (st.pA === 3 && st.pB === 3) { st.deuce = true; st.pA = 0; st.pB = 0; }
        else if (st.pA === 4) winGame('a');
        else if (st.pB === 4) winGame('b');
      }

      if (navigator.vibrate) navigator.vibrate(20);
      render();
    }

    // ---- Event listeners ----
    $('btn-start').addEventListener('click', () => {
      nA = $('in-a').value.trim() || 'Us';
      nB = $('in-b').value.trim() || 'Them';
      st = fresh();
      hist = [];
      show('s-game');
      render();
    });

    $('h-top').addEventListener('click', () => addPt('a'));
    $('h-bot').addEventListener('click', () => addPt('b'));

    $('btn-undo').addEventListener('click', (e) => {
      e.stopPropagation();
      if (hist.length) { st = hist.pop(); render(); }
    });

    $('btn-new').addEventListener('click', (e) => {
      e.stopPropagation();
      $('ov-confirm').classList.add('on');
    });

    $('btn-yes').addEventListener('click', goSetup);
    $('btn-no').addEventListener('click', () => $('ov-confirm').classList.remove('on'));
    $('btn-win-new').addEventListener('click', goSetup);

    // ---- Service worker for offline ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    render();
  </script>
</body>
</html>
